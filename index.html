    <script>

        var firebaseConfig = {
            apiKey: "AIzaSyCYqic9IlxUXlS_yEuMLZvmg16wGh5_Ing",

// ===== FUNÇÕES DAS ABAS =====
function abrirAba(nomeAba) {
  // Esconder todas as abas
  var abas = document.querySelectorAll('.aba-content');
  abas.forEach(aba => aba.classList.remove('active'));

  // Remover ativo de todos os botões
  var botoes = document.querySelectorAll('.tab-btn');
  botoes.forEach(botao => botao.classList.remove('active'));

  // Mostrar aba selecionada
  document.getElementById('aba-' + nomeAba).classList.add('active');
  if (event && event.target) {
    event.target.classList.add('active');
  }

  // Carregar dados (APENAS se não for filtro de dia)
  if (nomeAba === 'andamento' && !window.filtrandoPorDia) {
    carregarPedidosAndamento();
  } else if (nomeAba === 'finalizados') {
    carregarPedidosFinalizados();
  }

  // Sempre mostrar calendário
  renderizarCalendario();
}

function converterDataParaBR(dataISO) {
  if (!dataISO) return '';
  // Se já está em formato DD/MM/YYYY, retorna como está
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(dataISO)) {
    return dataISO;
  }
  // Se está em formato ISO (YYYY-MM-DD), converte
  const partes = dataISO.split('-');
  if (partes.length === 3) {
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }
  return dataISO;
}

        // ===== FUNÇÕES DOS PEDIDOS =====
function carregarPedidosAndamento() {
  const lista = document.getElementById('pedidosAndamentoList');
  if (!lista) return;

  // Limpa a lista antes de carregar
  lista.innerHTML = '';

  try {
    firebase.database().ref('pedidos').once('value', (snapshot) => {
      const pedidos = [];
      snapshot.forEach((child) => {
        const pedido = child.val();
        // Filtra os que NÃO estão com statusPagamento === 'Pago'
        if (pedido.statusPagamento === 'entregue') return;
        // Verifica se dataEntrega existe
        if (!pedido.dataEntrega) return;
        pedido.key = child.key;
        pedidos.push(pedido);
      });

      if (pedidos.length === 0) {
        lista.innerHTML = '<p>Nenhum pedido em andamento</p>';
        return;
      }

      // Função auxiliar para converter data no formato DD/MM/YYYY para Date
      function parseData(dataStr) {
        // Verifica se está no formato ISO (YYYY-MM-DD)
        if (/^\d{4}-\d{2}-\d{2}$/.test(dataStr)) {
          return new Date(dataStr + 'T00:00:00');
        }
        // Caso contrário, assume DD/MM/YYYY
        const partes = dataStr.split('/');
        if (partes.length === 3) {
          return new Date(partes[2], partes[1] - 1, partes[0]);
        }
        return null;
      }

      // Ordena por data de entrega (mais próximos primeiro)
      pedidos.sort((a, b) => {
        const dataA = parseData(a.dataEntrega);
        const dataB = parseData(b.dataEntrega);
        if (!dataA && !dataB) return 0;
        if (!dataA) return 1;
        if (!dataB) return -1;
        return dataA - dataB;
      });

// Exibe os pedidos
pedidos.forEach((pedido) => {
  const div = document.createElement('div');
  div.className = 'pedido-card';

  // Formatar valor
  var valorFormatado = pedido.valor || pedido.valorTotal || 'R$ 0,00';
  if (typeof valorFormatado === 'number') {
    valorFormatado = 'R$ ' + valorFormatado.toFixed(2).replace('.', ',');
  }

var itensHTML = '';
if (pedido.itens && Array.isArray(pedido.itens)) {
  pedido.itens.forEach(item => {
    let detalhes = `${item.formato || 'N/A'}`;
    
    if (item.tipoForma && item.cor) {
      detalhes += ` | ${item.tipoForma}/${item.cor}`;
    } else if (item.tipoForma) {
      detalhes += ` | ${item.tipoForma}`;
    } else if (item.cor) {
      detalhes += ` | ${item.cor}`;
    }
    
    itensHTML += `
      <div class="pedido-item">
        • <strong>${item.nome || item.sabor || 'Item'}</strong> - Qtd: ${item.quantidade}<br>
        <span style="margin-left: 20px; font-size: 0.9em; color: #666;">Formato: ${detalhes}</span>
      </div>
    `;
  });
}

  div.innerHTML = `
    <div class="pedido-header">
      <div class="pedido-nome">${pedido.nome || 'N/A'}</div>
      <div class="pedido-status status-andamento">${pedido.statusPagamento || 'A pagar'}</div>
    </div>
    
    <!-- RESUMO VISÍVEL -->
    <div class="pedido-info-resumo">
      <div class="pedido-info"><strong>Telefone:</strong> ${pedido.telefone || 'N/A'}</div>
      <div class="pedido-info"><strong>Data:</strong> ${converterDataParaBR(pedido.dataEntrega) || 'N/A'} ${pedido.hora ? 'às ' + pedido.hora : ''}</div>
      <div class="pedido-info"><strong>Valor:</strong> ${valorFormatado}</div>
    </div>

    <!-- DETALHES OCULTOS -->
    <div class="pedido-detalhes" id="detalhes-${pedido.key}" style="display: none;">
${pedido.tipoEntrega === 'retirada' ? `
  <div class="pedido-info">
    <strong>Tipo de entrega:</strong> ${pedido.tipoEntrega}
  </div>
` : ''}
      ${pedido.tipoEntrega === 'entrega' ? `
        <div class="pedido-info">
          <strong>Endereço:</strong> ${pedido.endereco ? pedido.endereco.logradouro + ', ' + pedido.endereco.numero + ' - ' + pedido.endereco.bairro + ', ' + pedido.endereco.cidade : 'N/A'}
        </div>
      ` : ''}
<div class="pedido-itens">
  ${itensHTML}
</div>
      <div class="pedido-info">
        <strong>Observações:</strong> ${pedido.observacoes || 'Nenhuma'}
      </div>
      <div class="pedido-info">
        <strong>Status Pagamento:</strong> ${pedido.statusPagamento || 'N/A'}
      </div>
${pedido.statusPagamento === 'Pago Parcialmente' ? `
  <div class="pedido-info">
    <strong>Valor Pago:</strong> ${pedido.valorPago || 'Aguardando informação'}
  </div>
` : ''}
    </div>

    <!-- BOTÕES -->
    <div class="pedido-botoes">
      <button class="btn-finalizar" onclick="toggleDetalhes('${pedido.key}')">ℹ️ Mais Informações</button>
      <button class="btn-finalizar" onclick="finalizarPedido('${pedido.key}')">✓ Finalizar Pedido</button>
    </div>
  `;
  lista.appendChild(div);
});
    }, (error) => {
      console.error('Erro ao carregar pedidos:', error);
      lista.innerHTML = '<p>Erro ao carregar pedidos. Tente novamente mais tarde.</p>';
    });
  } catch (error) {
    console.error('Erro na função carregarPedidosAndamento:', error);
    lista.innerHTML = '<p>Erro inesperado. Verifique o console.</p>';
  }
}

// Chamar a função quando a página carregar
document.addEventListener('DOMContentLoaded', carregarPedidosAndamento);

  ref.once('value')
    .then(snapshot => {

          pedidos.push(pedido);

      });
      if (pedidos.length === 0) {
        lista.innerHTML = '<p>Nenhum pedido finalizado</p>';
        return;
      }
      pedidos.sort((a, b) => {
        const dataA = new Date(a.dataEntrega);
        const dataB = new Date(b.dataEntrega);
        return dataA - dataB;
      });
for (const pedido of pedidos) {
  const card = document.createElement('div');
  card.className = 'pedido-card';

  // Formatar valor
  var valorFormatado = pedido.valor || pedido.valorTotal || 'R$ 0,00';

function toggleDetalhes(key) {

  }

function finalizarPedido(key) {
  if (!confirm('Tem certeza que deseja finalizar este pedido?')) {
    return;
  }
  firebase.database().ref('pedidos/' + key).update({
    statusPagamento: 'entregue'
  }).then(() => {
    carregarPedidosAndamento();
    carregarPedidosFinalizados();
    renderizarCalendario();
    alert('Pedido finalizado com sucesso!');
  }).catch((error) => {
    alert('Erro ao finalizar pedido: ' + error.message);
  });
}


// ===== FUNÇÕES DO CALENDÁRIO =====
var mesAtual = new Date().getMonth();
var anoAtual = new Date().getFullYear();

function adicionarContadorDia(dia) {
    var diaElement = document.getElementById('dia-' + dia);
    if (diaElement) {
        diaElement.classList.remove('sem-pedidos');
        var contador = diaElement.querySelector('.dia-contador');
        if (!contador) {
            contador = document.createElement('div');
            contador.className = 'dia-contador';
            contador.textContent = '1';
            diaElement.appendChild(contador);
        } else {
            contador.textContent = parseInt(contador.textContent) + 1;
        }
    }
}

function renderizarCalendario() {
    var container = document.getElementById('calendario-container');
    var monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
    var dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
    var html = ` 
    <div class="calendario-header">
        <button class="btn-mes" onclick="mesAnterior()">← Anterior</button>
        <h3>${monthNames[mesAtual]} de ${anoAtual}</h3>
        <button class="btn-mes" onclick="proximoMes()">Próximo →</button>
    </div>
    <div class="calendario-grid">
    `;
    
    // Dias da semana
    dayNames.forEach(day => {
        html += `<div class="dia-semana">${day}</div>`;
    });
    
    // Primeira semana (dias em branco)
    var primeira = new Date(anoAtual, mesAtual, 1);
    var diasAntes = primeira.getDay();
    for (var i = 0; i < diasAntes; i++) {
        html += `<div class="dia outro-mes"></div>`;
    }
    
    // Dias do mês
    var ultimoDia = new Date(anoAtual, mesAtual + 1, 0).getDate();
    for (var dia = 1; dia <= ultimoDia; dia++) {
        var dataStr = anoAtual + '-' + String(mesAtual + 1).padStart(2, '0') + '-' + String(dia).padStart(2, '0');
        html += `<div class="dia sem-pedidos" id="dia-${dia}" onclick="filtrarPedidosPorDia('${dataStr}')"><div class="dia-numero">${dia}</div></div>`;
    }
    
    // Dias em branco após o mês
    var diasDepois = 42 - (diasAntes + ultimoDia);
    for (var i = 0; i < diasDepois; i++) {
        html += `<div class="dia outro-mes"></div>`;
    }
    
    html += `</div>`;
    container.innerHTML = html;
    
    // Carregar contadores do Firebase (com delay)
    setTimeout(function() {
        database.ref('pedidos').once('value', function(snapshot) {
            var pedidos = snapshot.val();
            if (pedidos) {
                Object.keys(pedidos).forEach(function(key) {
                    var pedido = pedidos[key];
                    if (pedido.statusPagamento !== 'entregue' && pedido.data) {
                        var partes = pedido.data.split('/');
                        if (partes.length === 3) {
                            var dia = parseInt(partes[0]);
                            var mes = parseInt(partes[1]) - 1;
                            var ano = parseInt(partes[2]);
                            if (ano === anoAtual && mes === mesAtual) {
                                console.log('Adicionando contador para dia:', dia);
                                adicionarContadorDia(dia);
                            }
                        }
                    }
                });
            }
        });
    }, 100);
} // ← FECHA AQUI

function mesAnterior() {
    mesAtual--;
    if (mesAtual < 0) {
        mesAtual = 11;
        anoAtual--;
    }
    renderizarCalendario();
}

function proximoMes() {
    mesAtual++;
    if (mesAtual > 11) {
        mesAtual = 0;
        anoAtual++;
    }
    renderizarCalendario();
}

// Inicializar calendário UMA ÚNICA VEZ
renderizarCalendario();

function filtrarPedidosPorDia(dataSelecionada) {
    // Marcar que estamos filtrando por dia
    window.filtrandoPorDia = true;
    
    // Esconder todas as abas
    var abas = document.querySelectorAll('.aba-content');
    abas.forEach(aba => aba.classList.remove('active'));

    // Remover ativo de todos os botões
    var botoes = document.querySelectorAll('.tab-btn');
    botoes.forEach(botao => botao.classList.remove('active'));

    // Mostrar aba "em andamento"
    document.getElementById('aba-andamento').classList.add('active');
    document.querySelectorAll('.tab-btn')[1].classList.add('active'); // Segundo botão é "em andamento"

    // Carregar pedidos e filtrar pelo dia
    database.ref('pedidos').once('value', function(snapshot) {
        var pedidos = snapshot.val();
        var listDiv = document.getElementById('pedidosAndamentoList');
        listDiv.innerHTML = '';

        if (!pedidos) {
            listDiv.innerHTML = `<p>Nenhum pedido em andamento para ${dataSelecionada}</p>`;
            renderizarCalendario();
            return;
        }

        var pedidosEncontrados = false;

        Object.keys(pedidos).forEach(function(key) {
            var pedido = pedidos[key];
            
            // Filtrar por status "em andamento" E data do dia selecionado
            // Converter a data do formulário (DD/MM/YYYY) para o formato do calendário (YYYY-MM-DD)
        // Converter data DD/MM/YYYY para YYYY-MM-DD para comparação
var dataPedidoFormatada = pedido.data;
if (pedido.data && pedido.data.includes('/')) {
  const partes = pedido.data.split('/');
  dataPedidoFormatada = `${partes[2]}-${partes[1]}-${partes[0]}`;
}

        if (pedido.statusPagamento !== 'entregue' && dataPedidoFormatada === dataSelecionada) {
                listDiv.appendChild(criarCardPedido(pedido, key));
                pedidosEncontrados = true;
            }
        });

        if (!pedidosEncontrados) {
            listDiv.innerHTML = `<p>Nenhum pedido em andamento para ${dataSelecionada}</p>`;
        }

        // Mostrar calendário
        renderizarCalendario();
        
        // Resetar flag
        window.filtrandoPorDia = false;
    });
}

function toggleDetalhes(key) {
  var detalhes = document.getElementById('detalhes-' + key);
  if (detalhes.style.display === 'none') {
    detalhes.style.display = 'block';
  } else {
    detalhes.style.display = 'none';
