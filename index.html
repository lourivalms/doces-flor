<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces Flor - Gerenciador de Pedidos</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        /* ===== ABAS ===== */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f8bbd0;
        }

        .tab-btn {
            padding: 12px 25px;
            background: #fff5f5;
            border: 2px solid #f8bbd0;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: #5d4037;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: #fce4ec;
            border-color: #d81b60;
        }

        .tab-btn.active {
            background: #d81b60;
            color: white;
            border-color: #d81b60;
        }

        /* ===== CONTEÚDO DAS ABAS ===== */
        .aba-content {
            display: none;
            padding: 30px;
            background: white;
            border-radius: 0 10px 10px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .aba-content.active {
            display: block;
        }

        .aba-content h2 {
            color: #d81b60;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        /* ===== BOTÃO NOVO PEDIDO ===== */
        .btn-novo-pedido {
            display: block;
            width: 100%;
            padding: 20px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-novo-pedido:hover {
            background: #128C7E;
        }

        /* ===== LISTA DE PEDIDOS ===== */
        .pedido-card {
            background: #fff5f5;
            border: 2px solid #f8bbd0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .pedido-nome {
            font-size: 1.3em;
            font-weight: bold;
            color: #d81b60;
        }

        .pedido-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .status-andamento {
            background: #fff3e0;
            color: #e65100;
        }

        .status-entregue {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .pedido-info {
            font-size: 0.95em;
            margin: 8px 0;
            color: #5d4037;
        }

        .pedido-itens {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            border-left: 4px solid #d81b60;
        }

        .pedido-item {
            margin: 5px 0;
            font-size: 0.9em;
        }

        .btn-finalizar {
            background: #d81b60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-finalizar:hover {
            background: #ad1457;
        }

        /* ===== CALENDÁRIO ===== */
        #calendario-container {
            margin-top: 40px;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .calendario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendario-header h3 {
            color: #d81b60;
            font-size: 1.5em;
        }

        .btn-mes {
            background: #f8bbd0;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #d81b60;
        }

        .btn-mes:hover {
            background: #f48fb1;
        }

        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .dia-semana {
            text-align: center;
            font-weight: bold;
            color: #d81b60;
            padding: 10px;
        }

        .dia {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #f8bbd0;
            border-radius: 8px;
            background: #fffaf5;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .dia:hover {
            border-color: #d81b60;
            background: #fce4ec;
        }

        .dia.outro-mes {
            opacity: 0.4;
            background: #f5f5f5;
        }

        .dia-numero {
            font-size: 1.1em;
            font-weight: bold;
            color: #4a2c2c;
        }

        .dia-contador {
            font-size: 0.8em;
            background: #d81b60;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 3px;
            font-weight: bold;
        }

        .dia.sem-pedidos .dia-contador {
            display: none;
        }

        /* ===== MODAL DO FORMULÁRIO ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            height: 90vh;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #d81b60;
            z-index: 10000;
        }

        .close:hover {
            color: #ad1457;
        }

@media (max-width: 768px) {

    }

    }

    #calendario-container {

    }

    .calendario-header {
        margin-bottom: 15px;
    }

    .calendario-header h3 {
        font-size: 1.2em;
    }

        padding: 6px 12px;
        font-size: 0.85em;
    }

    }

    }

    }

        width: 95%;

    }

    }
}

@media (max-width: 480px) {

        padding: 8px;
        margin: 0;
    }

    h1 {

    </style>

<body>
    <div class="container">
        <h1>🍫 Doces Flor - Gerenciador de Pedidos</h1>
        
        <!-- ABAS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="abrirAba('criar')">
                ➕ Criar Pedido
            </button>
            <button class="tab-btn" onclick="abrirAba('andamento')">
                📦 Pedidos em Andamento
            </button>
            <button class="tab-btn" onclick="abrirAba('finalizados')">
                ✅ Pedidos Finalizados
            </button>
        </div>
        
        <!-- ABA 1: CRIAR PEDIDO -->
        <div id="aba-criar" class="aba-content active">
            <button class="btn-novo-pedido" onclick="abrirFormulario()">
                ➕ Novo Pedido
            </button>
        </div>
        
        <!-- ABA 2: PEDIDOS EM ANDAMENTO -->
        <div id="aba-andamento" class="aba-content">
            <h2>Pedidos em Andamento</h2>
            <div id="lista-andamento"></div>
        </div>
        
        <!-- ABA 3: PEDIDOS FINALIZADOS -->
        <div id="aba-finalizados" class="aba-content">
            <h2>Pedidos Finalizados</h2>
            <div id="lista-finalizados"></div>
        </div>
        
        <!-- CALENDÁRIO (aparece em todas as abas) -->
        <div id="calendario-container"></div>
    </div>

    <!-- IFRAME para o formulário de pedidos (oculto) -->
    <div id="modal-formulario" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="fecharFormulario()">&times;</span>
            <iframe id="iframe-pedidos" src="pedidos.html" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <script>
        // ===== CONFIGURAÇÃO DO FIREBASE =====
        var firebaseConfig = {
            apiKey: "AIzaSyCYqic9IlxUXlS_yEuMLZvmg16wGh5_Ing",
            authDomain: "doces-flor.firebaseapp.com",
            databaseURL: "https://doces-flor-default-rtdb.firebaseio.com",
            projectId: "doces-flor",
            storageBucket: "doces-flor.firebasestorage.app",
            messagingSenderId: "430929421910",
            appId: "1:430929421910:web:2f1bea78c78602c3387df7",
            measurementId: "G-KZTGCCEDXJ"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

// ===== FUNÇÕES DAS ABAS =====
function abrirAba(nomeAba) {
    // Esconder todas as abas
    var abas = document.querySelectorAll('.aba-content');
    abas.forEach(aba => aba.classList.remove('active'));

    // Remover ativo de todos os botões
    var botoes = document.querySelectorAll('.tab-btn');
    botoes.forEach(botao => botao.classList.remove('active'));

    // Mostrar aba selecionada
    document.getElementById('aba-' + nomeAba).classList.add('active');
    if (event && event.target) {
        event.target.classList.add('active');
    }

    // Carregar dados (APENAS se não for filtro de dia)
    if (nomeAba === 'andamento' && !window.filtrandoPorDia) {
        carregarPedidosAndamento();
    } else if (nomeAba === 'finalizados') {
        carregarPedidosFinalizados();
    }

    // Sempre mostrar calendário
    renderizarCalendario();
}

        // ===== FUNÇÕES DO FORMULÁRIO =====
        function abrirFormulario() {
            document.getElementById('modal-formulario').style.display = 'flex';
        }

        function fecharFormulario() {
            document.getElementById('modal-formulario').style.display = 'none';
        }

        // ===== FUNÇÕES DOS PEDIDOS =====
        function carregarPedidosAndamento() {
            var listDiv = document.getElementById('lista-andamento');
            listDiv.innerHTML = '<p>Carregando...</p>';

            database.ref('pedidos').once('value', function(snapshot) {
                var pedidos = snapshot.val();
                listDiv.innerHTML = '';

                if (!pedidos) {
                    listDiv.innerHTML = '<p>Nenhum pedido em andamento</p>';
                    return;
                }

                Object.keys(pedidos).forEach(function(key) {
                    var pedido = pedidos[key];
                    if (pedido.statusPagamento !== 'entregue') {
                        listDiv.appendChild(criarCardPedido(pedido, key));
                    }
                });
            });
        }

        function carregarPedidosFinalizados() {
            var listDiv = document.getElementById('lista-finalizados');
            listDiv.innerHTML = '<p>Carregando...</p>';

            database.ref('pedidos').once('value', function(snapshot) {
                var pedidos = snapshot.val();
                listDiv.innerHTML = '';

                if (!pedidos) {
                    listDiv.innerHTML = '<p>Nenhum pedido finalizado</p>';
                    return;
                }

                Object.keys(pedidos).forEach(function(key) {
                    var pedido = pedidos[key];
                    if (pedido.statusPagamento === 'entregue') {
                        listDiv.appendChild(criarCardPedido(pedido, key, true));
                    }
                });
            });
        }

        function criarCardPedido(pedido, key, finalizado = false) {
            var card = document.createElement('div');
            card.className = 'pedido-card';

            var statusClass = finalizado ? 'status-entregue' : 'status-andamento';
            var statusTexto = finalizado ? 'Entregue ✅' : 'Em Andamento 📦';

            var itensHTML = '';
            if (pedido.itens && Array.isArray(pedido.itens)) {
                pedido.itens.forEach(item => {
                    itensHTML += `<div class="pedido-item">• ${item.sabor} - Qtd: ${item.quantidade}</div>`;
                });
            }

            var botaoFinalizar = !finalizado ? `<button class="btn-finalizar" onclick="finalizarPedido('${key}')">✓ Finalizar Pedido</button>` : '';

            card.innerHTML = `
                <div class="pedido-header">
                    <div class="pedido-nome">${pedido.nome}</div>
                    <div class="pedido-status ${statusClass}">${statusTexto}</div>
                </div>
                <div class="pedido-info">
                    <strong>Telefone:</strong> ${pedido.telefone}
                </div>
                <div class="pedido-info">
                    <strong>Data:</strong> ${pedido.data} às ${pedido.hora}
                </div>
                <div class="pedido-info">
                    <strong>Tipo:</strong> ${pedido.tipoEntrega === 'entrega' ? 'Entrega' : 'Retirada'}
                </div>
                ${pedido.tipoEntrega === 'entrega' ? `
                    <div class="pedido-info">
                        <strong>Endereço:</strong> ${pedido.endereco.logradouro}, ${pedido.endereco.numero} - ${pedido.endereco.bairro}, ${pedido.endereco.cidade}
                    </div>
                ` : ''}
                <div class="pedido-itens">
                    <strong>Itens:</strong>
                    ${itensHTML}
                </div>
                <div class="pedido-info">
                    <strong>Total:</strong> R$ ${pedido.valorTotal ? pedido.valorTotal.toFixed(2) : '0.00'}
                </div>
                ${botaoFinalizar}
            `;

            return card;
        }

        function finalizarPedido(key) {
            if (confirm('Tem certeza que deseja finalizar este pedido?')) {
                database.ref('pedidos/' + key).update({
                    statusPagamento: 'entregue'
                }).then(function() {
                    alert('Pedido finalizado com sucesso!');
                    carregarPedidosAndamento();
                    carregarPedidosFinalizados();
                    renderizarCalendario();
                }).catch(function(error) {
                    alert('Erro ao finalizar pedido: ' + error.message);
                });
            }
        }

        // ===== FUNÇÕES DO CALENDÁRIO =====
        var mesAtual = new Date().getMonth();
        var anoAtual = new Date().getFullYear();

        function renderizarCalendario() {
            var container = document.getElementById('calendario-container');
            var monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            var dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];

            var html = `
                <div class="calendario-header">
                    <button class="btn-mes" onclick="mesAnterior()">← Anterior</button>
                    <h3>${monthNames[mesAtual]} de ${anoAtual}</h3>
                    <button class="btn-mes" onclick="proximoMes()">Próximo →</button>
                </div>
                <div class="calendario-grid">
            `;

            // Dias da semana
            dayNames.forEach(day => {
                html += `<div class="dia-semana">${day}</div>`;
            });

            // Primeira semana (dias em branco)
            var primeira = new Date(anoAtual, mesAtual, 1);
            var diasAntes = primeira.getDay();
            for (var i = 0; i < diasAntes; i++) {
                html += `<div class="dia outro-mes"></div>`;
            }

            // Dias do mês
            var ultimoDia = new Date(anoAtual, mesAtual + 1, 0).getDate();
            for (var dia = 1; dia <= ultimoDia; dia++) {
            var dataStr = anoAtual + '-' + String(mesAtual + 1).padStart(2, '0') + '-' + String(dia).padStart(2, '0');
                html += `<div class="dia sem-pedidos" id="dia-${dia}" onclick="filtrarPedidosPorDia('${dataStr}')"><div class="dia-numero">${dia}</div></div>`;
}

            // Dias em branco após o mês
            var diasDepois = 42 - (diasAntes + ultimoDia);
            for (var i = 0; i < diasDepois; i++) {
                html += `<div class="dia outro-mes"></div>`;
            }

            html += `</div>`;
            container.innerHTML = html;

            // Carregar contadores do Firebase
            database.ref('pedidos').once('value', function(snapshot) {
                var pedidos = snapshot.val();
                if (pedidos) {
                    Object.keys(pedidos).forEach(function(key) {
                        var pedido = pedidos[key];
                        if (pedido.statusPagamento !== 'entregue' && pedido.data) {
                            var partes = pedido.data.split('-');
                            if (partes.length === 3) {
                                var ano = parseInt(partes[0]);
                                var mes = parseInt(partes[1]) - 1;
                                var dia = parseInt(partes[2]);

                                if (ano === anoAtual && mes === mesAtual) {
                                    adicionarContadorDia(dia);
                                }
                            }
                        }
                    });
                }
            });
        }

        function adicionarContadorDia(dia) {
            var diaElement = document.getElementById('dia-' + dia);
            if (diaElement) {
                diaElement.classList.remove('sem-pedidos');
                var contador = diaElement.querySelector('.dia-contador');
                if (!contador) {
                    contador = document.createElement('div');
                    contador.className = 'dia-contador';
                    contador.textContent = '1';
                    diaElement.appendChild(contador);
                } else {
                    contador.textContent = parseInt(contador.textContent) + 1;
                }
            }
        }

        function mesAnterior() {
            mesAtual--;
            if (mesAtual < 0) {
                mesAtual = 11;
                anoAtual--;
            }
            renderizarCalendario();
        }

        function proximoMes() {
            mesAtual++;
            if (mesAtual > 11) {
                mesAtual = 0;
                anoAtual++;
            }
            renderizarCalendario();
        }

        // Inicializar calendário
        renderizarCalendario();
 function filtrarPedidosPorDia(dataSelecionada) {
    // Marcar que estamos filtrando por dia
    window.filtrandoPorDia = true;
    
    // Esconder todas as abas
    var abas = document.querySelectorAll('.aba-content');
    abas.forEach(aba => aba.classList.remove('active'));

    // Remover ativo de todos os botões
    var botoes = document.querySelectorAll('.tab-btn');
    botoes.forEach(botao => botao.classList.remove('active'));

    // Mostrar aba "em andamento"
    document.getElementById('aba-andamento').classList.add('active');
    document.querySelectorAll('.tab-btn')[1].classList.add('active'); // Segundo botão é "em andamento"

    // Carregar pedidos e filtrar pelo dia
    database.ref('pedidos').once('value', function(snapshot) {
        var pedidos = snapshot.val();
        var listDiv = document.getElementById('lista-andamento');
        listDiv.innerHTML = '';

        if (!pedidos) {
            listDiv.innerHTML = `<p>Nenhum pedido em andamento para ${dataSelecionada}</p>`;
            renderizarCalendario();
            return;
        }

        var pedidosEncontrados = false;

        Object.keys(pedidos).forEach(function(key) {
            var pedido = pedidos[key];
            
            // Filtrar por status "em andamento" E data do dia selecionado
            // Converter a data do formulário (DD/MM/YYYY) para o formato do calendário (YYYY-MM-DD)
        var dataPedidoFormatada = pedido.data.split('/').reverse().join('-');

        if (pedido.statusPagamento !== 'entregue' && dataPedidoFormatada === dataSelecionada) {
                listDiv.appendChild(criarCardPedido(pedido, key));
                pedidosEncontrados = true;
            }
        });

        if (!pedidosEncontrados) {
            listDiv.innerHTML = `<p>Nenhum pedido em andamento para ${dataSelecionada}</p>`;
        }

        // Mostrar calendário
        renderizarCalendario();
        
        // Resetar flag
        window.filtrandoPorDia = false;
    });
}

    </script>
</body>
</html>
