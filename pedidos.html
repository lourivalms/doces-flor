        // Máscaras
function maskTelefone(value) {
    value = value.replace(/\D/g, '');
    if (value.length > 11) value = value.slice(0, 11);
    if (value.length === 0) return '';
    if (value.length <= 2) return '(' + value;
    if (value.length <= 7) return '(' + value.slice(0, 2) + ') ' + value.slice(2);
    return '(' + value.slice(0, 2) + ') ' + value.slice(2, 7) + '-' + value.slice(7);
}
        function maskCEP(value) {
            return value.replace(/\D/g, '').replace(/(\d{5})(\d{3})/, '$1-$2');
        }
        function maskData(value) {
            value = value.replace(/\D/g, '');
            if (value.length >= 2) value = value.slice(0,2) + '/' + value.slice(2);
            if (value.length >= 5) value = value.slice(0,5) + '/' + value.slice(5,9);
            return value.slice(0,10);
        }
        function validateDate(dateStr) {
            const [day, month, year] = dateStr.split('/').map(Number);
            const date = new Date(year, month - 1, day);
            return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
        }

        document.getElementById('telefone').addEventListener('input', function(e) {
            e.target.value = maskTelefone(e.target.value);
        });
        document.getElementById('cep').addEventListener('input', function(e) {
            e.target.value = maskCEP(e.target.value);
        });

// Controlar campos de endereço baseado no tipo de entrega
function toggleAddressFields(selectedValue) {
    const fields = ['cep', 'endereco', 'bairro', 'cidade', 'numero', 'pontoReferencia'];
    const isEntrega = selectedValue === 'entrega';
    
    fields.forEach(fieldId => {
        const field = document.getElementById(fieldId);
        if (field) {
            field.disabled = !isEntrega;
            if (!isEntrega) {
                field.value = ''; // Limpar o valor quando desabilitado
            }
        }
    });
}
document.getElementById('cor').addEventListener('change', function() {
    const corCustomizada = document.getElementById('corCustomizada');
    if (this.value === 'Outra') {

    } else {

        corCustomizada.value = '';

});

// Validar data de entrega
function validarDataEntrega() {
    const dataEntrega = document.getElementById('dataEntrega').value;
    const hoje = new Date().toISOString().split('T')[0];
    if (dataEntrega < hoje) {
        alert('Data de entrega não pode ser anterior à data atual.');
        document.getElementById('dataEntrega').value = '';
    }
}

document.getElementById('dataEntrega').addEventListener('blur', validarDataEntrega);

        // Autocomplete CEP
document.getElementById('cep').addEventListener('blur', function() {
    const cep = this.value.replace(/\D/g, '');
    if (cep.length === 8) {
		fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(response => response.json())
            .then(data => {
                if (!data.erro) {
                    document.getElementById('endereco').value = data.logradouro;
                    document.getElementById('bairro').value = data.bairro;
                    document.getElementById('cidade').value = data.localidade;
                }
            })
            .catch(error => console.error('Erro ao buscar CEP:', error));
    }
});
document.getElementById('valorPago').addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length === 0) {
        e.target.value = '';
    } else {
        let numValue = parseInt(value) / 100;
        e.target.value = 'R$ ' + numValue.toFixed(2).replace('.', ',');
    }
});

document.getElementById('valorFrete').addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length === 0) {
        e.target.value = '';
    } else {
        let numValue = parseInt(value) / 100;
        e.target.value = 'R$ ' + numValue.toFixed(2).replace('.', ',');
    }
    updateValorTotal();
});

function updateValorTotal() {
    // Get elements com os IDs corretos
    let brigadeirosEl = document.getElementById('valor');

    let totalEl = document.getElementById('valorTotal');

    console.log('Valor Brigadeiros raw:', brigadeirosVal);
    console.log('Custo Frete raw:', freteVal);

    // Function to clean and parse value
    function cleanValue(val) {
        if (!val) return 0;
        return parseFloat(val.replace('R$', '').replace(',', '.').trim()) || 0;
    }

    let brigadeiros = cleanValue(brigadeirosVal);
    let frete = cleanValue(freteVal);

    console.log('Valor Brigadeiros cleaned:', brigadeiros);
    console.log('Custo Frete cleaned:', frete);

    let total = brigadeiros + frete;
    console.log('Total sum:', total);

    // Format as R$ X,XX
    let formatted = 'R$ ' + total.toFixed(2).replace('.', ',');
    console.log('Formatted total:', formatted);

    // Set the value
    if (totalEl) {
        totalEl.value = formatted;
    }
}

function updateItensList() {
    // Tabela de preços por sabor
    const precosPorSabor = {
    'Amendoim': 1.00,
    'Beijinho': 1.00,
    'Brigadeiro': 1.00,
    'Café': 1.00,
    'Dois Amores': 1.00,
    'Leite Ninho': 1.00,
    'Moranguinho': 1.00,
    'Sensação': 1.00,
    'Chocolate Gourmet Branco': 1.20,
    'Chocolate Gourmet Preto': 1.20,
    'Confete': 1.20,
    'Churros': 1.20,
    'Ferrero Rocher': 1.20,
    'Leite Ninho com Nutella': 1.20,
    'Negresco': 1.20,
    'Ovomaltine': 1.20,
    'Prestígio': 1.20
};

    const list = document.getElementById('itensList');
    list.innerHTML = '';
    
    // Ordenar itens por sabor (ordem alfabética)
    const itensOrdenados = [...itens].sort((a, b) => a.sabor.localeCompare(b.sabor));
    
    itensOrdenados.forEach((item, index) => {
        // Encontrar o índice original para o botão remover funcionar
        const indexOriginal = itens.findIndex(i => i.sabor === item.sabor && i.formato === item.formato && i.tipoForma === item.tipoForma && i.cor === item.cor && i.quantidade === item.quantidade);
        
        // Calcular preço unitário e valor total do item
        const precoPorUnidade = precosPorSabor[item.sabor] || 1.00;
        const subtotal = (precoPorUnidade * item.quantidade).toFixed(2);
        
        let sabor = item.sabor;
        // Abreviar chocolates gourmet
        sabor = sabor.replace('Chocolate Gourmet Preto', 'Choc. G. Preto');
        sabor = sabor.replace('Chocolate Gourmet Branco', 'Choc. G. Branco');
        
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <div class="item-info">
                <p><strong>${sabor}</strong></p>
                <p>Quantidade: ${item.quantidade}</p>
                <p>Brigadeiro: ${item.formato} | Forma: ${item.tipoForma} | Cor: ${item.cor}</p>
                <p><strong>Subtotal: R$ ${subtotal.replace('.', ',')} (R$ ${precoPorUnidade.toFixed(2).replace('.', ',')} × ${item.quantidade})</strong></p>
            </div>
            <button onclick="removeItem(${indexOriginal})" class="btn-remove">Remover</button>
        `;
        list.appendChild(div);
    });
}
function removeItem(index) {
    itens.splice(index, 1);

    updateValor();
}

};

    // Somar o valor CORRETO de cada item

document.getElementById('valor').value = `R$ ${total.toFixed(2).replace('.', ',')}`;

    if (totalEl) {
        totalEl.value = formatted;
    }
}

        // WhatsApp
// Global array 'itens' example (assuming it's defined elsewhere)
// let itens = [
//   { name: 'Brigadeiro', qty: 10, b: 'Redondo', f: 'Redonda', c: 'Branca' },
//   // more items
// ];

function sendWhatsApp() {
    // ===== VALIDAÇÃO: Verificar se tem itens =====
    if (!itens || itens.length === 0) {
        alert('❌ Adicione pelo menos um item antes de enviar!');
        return;
    }
    const nome = document.getElementById('nome').value;
    const telefone = document.getElementById('telefone').value;
    // Converter data do formato ISO (YYYY-MM-DD) para formato brasileiro (DD/MM/YYYY)
    const dataEntregaRaw = document.getElementById('dataEntrega').value;
    const dataEntrega = dataEntregaRaw ? dataEntregaRaw.split('-').reverse().join('/') : '';
    const horarioEntrega = document.getElementById('horarioEntrega').value;
    const tipoEntrega = document.getElementById('tipoEntrega').value;
    const endereco = document.getElementById('endereco').value;
    const bairro = document.getElementById('bairro').value;
    const cidade = document.getElementById('cidade').value;
    const numero = document.getElementById('numero').value;
    const cep = document.getElementById('cep').value;
    const pontoReferencia = document.getElementById('pontoReferencia').value;
    const valor = document.getElementById('valor').value;
    const valorFrete = document.getElementById('valorFrete').value;
    const valorTotal = document.getElementById('valorTotal').value;
    const statusPagamento = document.getElementById('statusPagamento').value;
    const observacoes = document.getElementById('observacoes').value;
    const valorPago = document.getElementById('valorPago').value;

    let message = `Pedidos - Doces Flor\n\n`;
    message += `Nome: ${nome}\n`;
    message += `Telefone: ${telefone}\n`;
message += `Data: ${dataEntrega} às ${horarioEntrega}\n`;
    if (tipoEntrega === 'retirada') {
        message += `Tipo de Entrega: Retirada\n`;
    }
    if (tipoEntrega === 'entrega') {
    const enderecoBuscaMapas = `${endereco}, ${numero}, ${bairro}, ${cidade}`;
    const linkMapas = `https://www.google.com/maps/search/${encodeURIComponent(enderecoBuscaMapas)}`;
    message += `Endereço: ${endereco}, ${numero}, ${bairro}, ${cidade}, CEP: ${cep} - ${linkMapas}\n`;
    if (pontoReferencia) {
        message += `Ponto de Referência: ${pontoReferencia}\n`;
    }
}
message += `──────────\nItens:\n`;

// Verificar se todos os itens têm as mesmas características
const primeiroItem = itens[0];
const todosIguais = itens.every(item => 
    item.formato === primeiroItem.formato && 
    item.tipoForma === primeiroItem.tipoForma && 
    item.cor === primeiroItem.cor
);

// Se apenas um item, exibir no formato de características
if (itens.length === 1) {
    const item = itens[0];
    let sabor = item.sabor;
    sabor = sabor.replace('Chocolate Gourmet Preto', 'Choc. G. Preto');
    sabor = sabor.replace('Chocolate Gourmet Branco', 'Choc. G. Branco');
    
message += `${sabor} - Qtd:${item.quantidade}\n`;
message += `B: ${item.formato} | F: ${item.tipoForma}/${item.cor}\n`;
} else if (todosIguais) {
    // Se todos forem iguais, exibir lista simples + características
    itens.forEach((item) => {
        let sabor = item.sabor;
        sabor = sabor.replace('Chocolate Gourmet Preto', 'Choc. G. Preto');
        sabor = sabor.replace('Chocolate Gourmet Branco', 'Choc. G. Branco');
        
        message += `${sabor} - Qtd:${item.quantidade}\n`;
    });
    
    message += `\nBrigadeiro: ${primeiroItem.formato}\n`;
    message += `Forma: ${primeiroItem.tipoForma}/${primeiroItem.cor}\n`;
} else {
    // Se forem diferentes, exibir cada item com suas características
    itens.forEach((item, index) => {
        let sabor = item.sabor;
        sabor = sabor.replace('Chocolate Gourmet Preto', 'Choc. G. Preto');
        sabor = sabor.replace('Chocolate Gourmet Branco', 'Choc. G. Branco');
        
        message += `${sabor} - Qtd:${item.quantidade}\n`;
        message += `B: ${item.formato} | F: ${item.tipoForma}/${item.cor}\n`;
        
        // Adicionar espaço entre itens (exceto o último)
        if (index < itens.length - 1) {
            message += `\n`;
        }
    });
}
message += `──────────\n`;
    // Verificar se há frete
    if (valorFrete && valorFrete !== 'R$ 0,00' && valorFrete.trim() !== '') {
        message += `Valor Brigadeiros: ${valor}\n`;
        message += `Valor Frete: ${valorFrete}\n`;
        message += `Valor Total: ${valorTotal}\n`;
    } else {
        // Se não houver frete, exibir apenas o total
        message += `Valor Total: ${valorTotal}\n`;
    }
    message += `Status Pagamento: ${statusPagamento}\n`;
    if (valorPago) {
        message += `Valor Pago: ${valorPago}\n`;
    }
    message += `\──────────\n`;
    if (observacoes) {
        message += `Observações: ${observacoes}\n`;
    }
// Abrir WhatsApp com delay para garantir que Firebase salvou primeiro
setTimeout(function() {
    const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
    window.parent.window.open(whatsappUrl, '_blank');
}, 1000);
// ===== SALVAR NO FIREBASE =====
var pedido = {
    nome: nome,
    telefone: telefone,
    data: dataEntrega,
    hora: horarioEntrega,
    tipoEntrega: tipoEntrega,
    endereco: tipoEntrega === 'entrega' ? {
        cep: document.getElementById('cep').value,
        logradouro: document.getElementById('endereco').value,
        numero: document.getElementById('numero').value,
        bairro: document.getElementById('bairro').value,
        cidade: document.getElementById('cidade').value,
        complemento: document.getElementById('pontoReferencia').value
    } : null,
    itens: itens,
    valorBrigadeiros: parseFloat(document.getElementById('valor').value.replace('R$ ', '').replace(',', '.')),
    valorFrete: parseFloat(document.getElementById('valorFrete').value.replace('R$ ', '').replace(',', '.')),
    valorTotal: parseFloat(document.getElementById('valorTotal').value.replace('R$ ', '').replace(',', '.')),
    statusPagamento: document.getElementById('statusPagamento').value,
    observacoes: document.getElementById('observacoes').value,
    timestamp: Date.now()
};

database.ref('pedidos/' + Date.now()).set(pedido).then(function() {
    alert('✅ Pedido salvo com sucesso!');
}).catch(function(error) {
    alert('❌ Erro ao salvar: ' + error.message);
});
}

// FORA da função, adicione o listener:
document.getElementById('sendWhatsApp').addEventListener('click', sendWhatsApp);
    </script>
